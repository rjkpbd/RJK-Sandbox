apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: home
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: 843833531624-compute@developer.gserviceaccount.com
      # 60-minute timeout — needed for long-running SSE streams from Claude Inbox
      timeoutSeconds: 3600
      containers:
        - image: IMAGE  # e.g. gcr.io/pbd-rjk/home:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: "512Mi"
              cpu: "1"
          env:
            # Non-sensitive env vars — set directly
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_SUPABASE_URL
              value: https://vzwblrdtltsrdimrjutf.supabase.co
            - name: NEXT_PUBLIC_APP_URL
              value: https://rjk.paleblue.nyc
            - name: MISSIVE_WEBHOOK_USER_ID
              value: 1c80f5cd-f16b-4b3f-9bcb-41584fb95cbc

            # Secrets — pulled from Google Cloud Secret Manager at runtime
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: SUPABASE_SERVICE_ROLE_KEY  # Secret Manager secret name
                  key: latest
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: NEXT_PUBLIC_SUPABASE_ANON_KEY
                  key: latest
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_CLIENT_ID
                  key: latest
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_CLIENT_SECRET
                  key: latest
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: SESSION_SECRET
                  key: latest
            - name: QUICKBOOKS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: QUICKBOOKS_CLIENT_ID
                  key: latest
            - name: QUICKBOOKS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: QUICKBOOKS_CLIENT_SECRET
                  key: latest
            - name: QUICKBOOKS_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: QUICKBOOKS_REDIRECT_URI
                  key: latest
            - name: QUICKBOOKS_SANDBOX
              valueFrom:
                secretKeyRef:
                  name: QUICKBOOKS_SANDBOX
                  key: latest
            - name: NOTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: NOTION_API_KEY
                  key: latest
            - name: NOTION_TASKS_DATABASE_ID
              valueFrom:
                secretKeyRef:
                  name: NOTION_TASKS_DATABASE_ID
                  key: latest
            - name: MISSIVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: MISSIVE_API_KEY
                  key: latest
            - name: MISSIVE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: MISSIVE_WEBHOOK_SECRET
                  key: latest
