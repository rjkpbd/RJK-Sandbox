steps:
  # Build the container image from the module directory
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/claude-inbox:${SHORT_SHA}"
      - "-f"
      - "modules/claude-inbox/infra/cloud-run/Dockerfile"
      - "modules/claude-inbox"

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/claude-inbox:${SHORT_SHA}"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "claude-inbox"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/claude-inbox:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=3001"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-secrets=NEXT_PUBLIC_SUPABASE_URL=NEXT_PUBLIC_SUPABASE_URL:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=NEXT_PUBLIC_SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/claude-inbox:${SHORT_SHA}"

substitutions:
  _REGION: us-central1
  _REPO: claude-inbox

options:
  logging: CLOUD_LOGGING_ONLY
